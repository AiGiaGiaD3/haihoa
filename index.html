<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Khu Rừng Hái Hoa — Sàng Lọc Tuyển Dụng</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#f7f9f4;
    --bg2:#eef3ea;
    --gold:#c48a00;
    --red:#c0392b;
    --leaf:#2d7a3a;
    --black:#1a1a14;
    --card:#ffffff;
    --border:#d4e0ce;
    --muted:#6b7f65;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:'Be Vietnam Pro','Segoe UI',system-ui,sans-serif;
    background:linear-gradient(160deg,var(--bg2) 0%,var(--bg) 60%,#e8f0e3 100%);
    color:var(--black);
    min-height:100dvh;
    overflow-x:hidden;
    user-select:none;
  }
  .wrap{max-width:560px;margin:0 auto;min-height:100dvh;display:flex;flex-direction:column;padding:18px 16px 26px}
  .screen{flex:1;display:none;flex-direction:column;animation:fade .4s ease}
  .screen.on{display:flex}
  @keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

  .eyebrow{font-size:11px;letter-spacing:.28em;text-transform:uppercase;color:var(--leaf);font-weight:700;text-align:center;margin-bottom:10px}
  h1{font-size:clamp(30px,9vw,46px);line-height:1.02;text-align:center;font-weight:900;letter-spacing:-.5px;color:var(--black)}
  .lead{text-align:center;color:var(--muted);font-size:15px;line-height:1.6;margin:18px 6px 0}

  .meadow{display:flex;justify-content:center;gap:10px;font-size:38px;margin:26px 0 6px;flex-wrap:wrap}
  .meadow span{animation:sway 3s ease-in-out infinite}
  .meadow span:nth-child(2n){animation-delay:.4s}
  .meadow span:nth-child(3n){animation-delay:.8s}
  @keyframes sway{0%,100%{transform:rotate(-6deg)}50%{transform:rotate(6deg)}}

  .btn{
    border:none;border-radius:14px;padding:17px 22px;font-size:17px;font-weight:800;
    font-family:'Be Vietnam Pro','Segoe UI',system-ui,sans-serif;cursor:pointer;width:100%;
    background:linear-gradient(180deg,#4a9e5a,var(--leaf));color:#fff;
    box-shadow:0 5px 0 #1b5224,0 10px 20px rgba(45,122,58,.22);
    transition:transform .08s,box-shadow .08s;letter-spacing:.01em;
  }
  .btn:active{transform:translateY(4px);box-shadow:0 1px 0 #1b5224,0 4px 10px rgba(45,122,58,.2)}
  .btn.ghost{
    background:transparent;color:var(--muted);box-shadow:none;
    border:1.5px solid var(--border);font-weight:600;font-size:14px;padding:13px
  }
  .btn.ghost:active{transform:translateY(2px)}
  .footer-cta{margin-top:auto;padding-top:22px}

  /* mission */
  .mission{
    margin:24px 4px 0;border-radius:18px;padding:22px 20px;
    background:var(--card);border:1.5px solid var(--border);
    box-shadow:0 4px 20px rgba(45,122,58,.08);
  }
  .mission .tag{display:inline-block;font-size:11px;letter-spacing:.18em;text-transform:uppercase;
    font-weight:800;padding:5px 12px;border-radius:20px;margin-bottom:14px}
  .mission.m1 .tag{background:#d4edd8;color:#1b5224}
  .mission.m2 .tag{background:#fef3cd;color:#7a5a00}
  .mission h2{font-size:22px;margin-bottom:10px;line-height:1.2;color:var(--black);font-weight:800}
  .mission p{font-size:15px;line-height:1.65;color:#4a5a46}
  .mission p b{color:var(--black)}

  /* HUD */
  .hud{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:4px}
  .hud .pill{
    background:var(--card);border:1.5px solid var(--border);border-radius:14px;
    padding:9px 14px;font-size:13px;font-weight:700;display:flex;flex-direction:column;
    line-height:1.1;gap:2px;box-shadow:0 2px 8px rgba(0,0,0,.06);
  }
  .hud .pill b{font-size:21px;color:var(--leaf)}
  .hud .pill.timer b{color:var(--black)}
  .hud .pill.timer.low{border-color:rgba(192,57,43,.5);background:#fff5f4}
  .hud .pill.timer.low b{color:var(--red);animation:tick .5s steps(1) infinite}
  @keyframes tick{0%,100%{opacity:1}50%{opacity:.35}}
  .hud .pill small{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);font-weight:700}
  .obj{text-align:center;font-size:13px;color:var(--muted);margin:10px 2px 6px;min-height:18px;font-weight:600}
  .obj b{color:var(--gold)}

  /* forest grid */
  .forest{
    flex:1;display:grid;grid-template-columns:repeat(5,1fr);gap:8px;align-content:center;
    padding:10px 2px;
  }

  /* Base flower tile */
  .flower{
    aspect-ratio:1;border:none;border-radius:15px;
    display:flex;align-items:center;justify-content:center;font-size:28px;cursor:pointer;
    position:relative;transition:transform .1s,box-shadow .1s,opacity .25s;
    box-shadow:0 5px 0 rgba(0,0,0,.18),0 7px 14px rgba(0,0,0,.10);
    border:1.5px solid rgba(255,255,255,.6);
  }

  /* Per-type tinted backgrounds — pastel of each flower's colour */
  .flower[data-key="white"] {background:linear-gradient(150deg,#dde8f8,#c4d6f4);box-shadow:0 5px 0 #8aaad8,0 7px 14px rgba(0,0,0,.10)}
  .flower[data-key="leaf"]  {background:linear-gradient(150deg,#c4eecb,#9ddba8);box-shadow:0 5px 0 #5aa86a,0 7px 14px rgba(0,0,0,.10)}
  .flower[data-key="red"]   {background:linear-gradient(150deg,#fbd4d0,#f6b0aa);box-shadow:0 5px 0 #c47070,0 7px 14px rgba(0,0,0,.10)}
  .flower[data-key="orange"]{background:linear-gradient(150deg,#fde8c4,#fad498);box-shadow:0 5px 0 #d4a048,0 7px 14px rgba(0,0,0,.10)}
  .flower[data-key="gold"]  {background:linear-gradient(150deg,#fef4b0,#fae878);box-shadow:0 5px 0 #c8b020,0 7px 14px rgba(0,0,0,.10)}
  .flower[data-key="pink"]  {background:linear-gradient(150deg,#fce4ee,#f8c4d8);box-shadow:0 5px 0 #d080a8,0 7px 14px rgba(0,0,0,.10)}
  .flower[data-key="purple"]{background:linear-gradient(150deg,#e4d4fc,#ccb8f8);box-shadow:0 5px 0 #9070c8,0 7px 14px rgba(0,0,0,.10)}
  .flower[data-key="carn"]  {background:linear-gradient(150deg,#f4c4dc,#eca0c8);box-shadow:0 5px 0 #a85088,0 7px 14px rgba(0,0,0,.10)}

  .flower:active{transform:translateY(4px) scale(.95);box-shadow:0 1px 0 rgba(0,0,0,.15),0 3px 6px rgba(0,0,0,.08)}
  .flower.picked{opacity:.22;pointer-events:none;transform:scale(.7) rotate(-12deg);box-shadow:none}
  .flower.pop{animation:pop .45s ease}
  @keyframes pop{0%{transform:scale(1)}40%{transform:scale(1.45)}100%{transform:scale(.7) rotate(-12deg)}}
  .flower .float{
    position:absolute;font-size:15px;font-weight:900;pointer-events:none;
    animation:floatup .8s ease forwards;opacity:0;
  }
  @keyframes floatup{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-34px)}}
  .flower .skull{
    position:absolute;font-size:34px;pointer-events:none;z-index:5;
    animation:skull .9s ease forwards;
  }
  @keyframes skull{0%{opacity:0;transform:scale(.4)}25%{opacity:1;transform:scale(1.6)}70%{opacity:1;transform:scale(1.2)}100%{opacity:0;transform:scale(1.4) translateY(-18px)}}

  /* result */
  .result-emoji{font-size:72px;text-align:center;margin:10px 0 4px;animation:pop2 .5s ease}
  @keyframes pop2{0%{transform:scale(0)}70%{transform:scale(1.2)}100%{transform:scale(1)}}
  .verdict{text-align:center;font-size:24px;font-weight:900;margin-bottom:4px;color:var(--black)}
  .verdict.good{color:var(--leaf)}
  .verdict.bad{color:var(--red)}
  .verdict.ok{color:#b07d00}
  .result-sub{text-align:center;font-size:15px;color:#4a5a46;line-height:1.6;margin:0 8px 18px}
  .result-sub b{color:var(--black)}
  .haul{display:flex;flex-wrap:wrap;justify-content:center;gap:6px;margin:6px 0 18px;font-size:28px}
  .lesson{
    margin:0 2px;border-radius:16px;padding:20px;
    background:var(--card);border:1.5px solid var(--border);
    box-shadow:0 3px 14px rgba(45,122,58,.08);
  }
  .lesson .eyebrow{text-align:left;margin-bottom:8px;color:var(--leaf)}
  .lesson p{font-size:15px;line-height:1.65;color:#3d4a3a}
  .lesson p b{color:var(--black)}
  .lesson p+p{margin-top:10px}
  .scoreline{text-align:center;font-size:17px;margin:2px 0 14px;font-weight:700;color:var(--black)}
  .scoreline b{color:var(--gold);font-size:22px}
</style>
</head>
<body>
<div class="wrap">

  <!-- INTRO -->
  <section class="screen on" id="s-intro">
    <h1 style="margin-top:auto">Rừng Hoa<br>Muôn Sắc 🌸</h1>
    <div class="meadow">
      <span>🌼</span><span>🌹</span><span>🍀</span><span>🤍</span><span>🌺</span><span>🌷</span><span>🌻</span>
    </div>
    <p class="lead">Mời bạn tham quan Rừng hoa muôn sắc.</p>
    <div class="footer-cta" style="margin-top:auto">
      <button class="btn" onclick="assign()">Vào rừng 🌲</button>
    </div>
  </section>

  <!-- MISSION -->
  <section class="screen" id="s-mission"></section>

  <!-- GAME -->
  <section class="screen" id="s-game">
    <div class="hud">
      <div class="pill basket"><small>Đã hái</small><span><b id="hud-count">0</b>/10</span></div>
      <div class="pill" id="hud-score-pill" style="display:none"><small>Điểm</small><b id="hud-score">0</b></div>
      <div class="pill timer" id="hud-timer-pill"><small>Thời gian</small><b id="hud-timer">10</b></div>
    </div>
    <div class="obj" id="obj"></div>
    <div class="forest" id="forest"></div>
  </section>

  <!-- RESULT -->
  <section class="screen" id="s-result"></section>

</div>
<script>
// ── Data ─────────────────────────────────────────────────────────────────────
const FLOWERS = [
  {key:'white',  emoji:'🤍', n:2, pts:100, name:'Trắng'},
  {key:'leaf',   emoji:'🍀', n:3, pts:50,  name:'Xanh lá'},
  {key:'red',    emoji:'🌹', n:5, pts:20,  name:'Đỏ'},
  {key:'orange', emoji:'🧡', n:5, pts:0,   name:'Cam'},
  {key:'gold',   emoji:'🌼', n:5, pts:0,   name:'Vàng'},
  {key:'pink',   emoji:'🌷', n:5, pts:0,   name:'Hồng'},
  {key:'purple', emoji:'💜', n:5, pts:0,   name:'Tím'},
  {key:'carn',   emoji:'🌺', n:5, pts:-10, name:'Ăn thịt người', killer:true},
];

// ── State ─────────────────────────────────────────────────────────────────────
let deck=[], mission=1, picked=[], score=0;
let timeLeft=10, timerId=null;

// ── Helpers ───────────────────────────────────────────────────────────────────
function show(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('on'));
  document.getElementById(id).classList.add('on');
}
function shuffle(a){
  for(let i=a.length-1;i>0;i--){
    const j=Math.random()*(i+1)|0;
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

// ── Screen: Mission ───────────────────────────────────────────────────────────
function assign(){
  mission = Math.random()<0.5 ? 1 : 2;
  const el = document.getElementById('s-mission');
  if(mission===1){
    el.innerHTML=`
      <div class="eyebrow">Nhiệm vụ của bạn</div>
      <div class="mission m1">
        <span class="tag">Yêu cầu 1</span>
        <h2>Hái hoa 🌸</h2>
        <p>Hái được <b>10 bông hoa bất kỳ</b>.</p>
      </div>
      <div class="footer-cta"><button class="btn" onclick="startGame()">Bắt đầu hái 🌿</button></div>`;
  } else {
    el.innerHTML=`
      <div class="eyebrow">Nhiệm vụ của bạn</div>
      <div class="mission m2">
        <span class="tag">Yêu cầu 2</span>
        <h2>Hái hoa 🌸</h2>
        <p>Hái 10 bông hoa, biết rằng hoa <b>Trắng</b> được 100 điểm, hoa <b>Xanh lá</b> được 50 điểm, hoa <b>Đỏ</b> được 20 điểm.</p>
      </div>
      <div class="footer-cta"><button class="btn" onclick="startGame()">Bắt đầu hái 🌿</button></div>`;
  }
  show('s-mission');
}

// ── Screen: Game ──────────────────────────────────────────────────────────────
function buildDeck(){
  deck=[];
  FLOWERS.forEach(f=>{ for(let i=0;i<f.n;i++) deck.push(f); });
  shuffle(deck);
}

function startGame(){
  picked=[]; score=0; buildDeck();
  document.getElementById('hud-count').textContent=0;
  document.getElementById('hud-score').textContent=0;
  document.getElementById('hud-score-pill').style.display = mission===2?'flex':'none';
  document.getElementById('obj').innerHTML = mission===2
    ? 'Trắng <b>+100</b> · Xanh lá <b>+50</b> · Đỏ <b>+20</b>'
    : 'Hái <b>10 bông hoa</b> bạn thích';

  const f=document.getElementById('forest');
  f.innerHTML='';
  deck.forEach((flo,i)=>{
    const b=document.createElement('button');
    b.className='flower';
    b.textContent=flo.emoji;
    b.dataset.i=i;
    b.dataset.key=flo.key;   // ← drives CSS per-type colours
    b.onclick=()=>pick(b,flo);
    f.appendChild(b);
  });

  startTimer();
  show('s-game');
}

// ── Timer ─────────────────────────────────────────────────────────────────────
function startTimer(){
  clearInterval(timerId);
  timeLeft=10;
  const pill=document.getElementById('hud-timer-pill');
  const num=document.getElementById('hud-timer');
  pill.classList.remove('low');
  num.textContent=timeLeft;
  timerId=setInterval(()=>{
    timeLeft--;
    num.textContent=timeLeft;
    if(timeLeft<=3) pill.classList.add('low');
    if(timeLeft<=0){ clearInterval(timerId); finish(true); }
  },1000);
}

// ── Pick ──────────────────────────────────────────────────────────────────────
function pick(btn,flo){
  if(picked.length>=10) return;
  picked.push(flo);
  btn.classList.add('picked','pop');

  // Hoa ăn thịt người → hiện đầu lâu + rung
  if(flo.killer){
    const sk=document.createElement('span');
    sk.className='skull';
    sk.textContent='💀';
    btn.appendChild(sk);
    if(navigator.vibrate) navigator.vibrate(120);
  }

  // Mission 2: cộng / trừ điểm, hiện float label
  if(mission===2){
    score+=flo.pts;
    document.getElementById('hud-score').textContent=score;
    const fl=document.createElement('span');
    fl.className='float';
    fl.textContent=(flo.pts>=0?'+':'')+flo.pts;
    fl.style.color=flo.pts>0?'#e8b53a':(flo.pts<0?'#d94f3a':'#9fb89e');
    btn.appendChild(fl);
  }

  document.getElementById('hud-count').textContent=picked.length;
  if(picked.length===10){ clearInterval(timerId); setTimeout(()=>finish(false),650); }
}

// ── Finish ────────────────────────────────────────────────────────────────────
function finish(timedOut){
  clearInterval(timerId);
  const killers = picked.filter(f=>f.killer).length;
  const haul    = picked.length ? picked.map(f=>f.emoji).join(' ') : '—';
  let emoji,verdictClass,verdict,sub,lessonTitle,lesson;

  // Case: time ran out before 10 picks
  if(timedOut && picked.length<10){
    emoji='⏰'; verdictClass='ok';
    verdict='Hết giờ rồi!';
    sub=`Bạn mới hái được <b>${picked.length}/10 bông</b> trong 10 giây. Vội vàng dễ bỏ lỡ — và cũng dễ chọn nhầm.`;
    lessonTitle='Bài học sàng lọc';
    lesson=`<p>Tuyển dụng có <b>áp lực thời gian</b>: chỉ tiêu gấp, thiếu người. Nhưng vội mà <b>không có tiêu chí</b> thì vừa không đủ người, vừa dễ "hái" nhầm.</p>
            <p>Tốc độ chỉ phát huy khi đi cùng một <b>bộ sàng lọc rõ ràng</b> — biết trước cần gì để quyết nhanh mà vẫn đúng.</p>`;
    renderResult(emoji,verdictClass,verdict,sub,lessonTitle,lesson,haul,false);
    return;
  }

  // Mission 1: no scoring criteria given
  if(mission===1){
    if(killers>0){
      emoji='💀'; verdictClass='bad';
      verdict='Bạn đã hái phải hoa ăn thịt người!';
      sub=`Trong giỏ có <b>${killers} bông hoa ăn thịt người</b>. Hái "bất kỳ" cũng đồng nghĩa với hái cả rủi ro.`;
    } else {
      emoji='😅'; verdictClass='ok';
      verdict='May mắn thoát nạn!';
      sub='Lần này bạn không hái phải hoa ăn thịt người — nhưng đó là <b>may rủi</b>, không phải nhờ sàng lọc.';
    }
    lessonTitle='Bài học sàng lọc';
    lesson=`<p>Khi tuyển dụng <b>không có tiêu chí rõ ràng</b>, ta "hái" ứng viên một cách ngẫu nhiên — ai nộp cũng nhận. Khu rừng nào cũng có hoa ăn thịt người ẩn trong đám hoa đẹp.</p>
            <p>Người làm theo Yêu cầu 1 không hề biết bông nào nguy hiểm, vì <b>chẳng ai cho họ bộ tiêu chí</b> để loại trừ.</p>`;

  // Mission 2: has scoring criteria
  } else {
    if(killers>0){
      emoji='💀'; verdictClass='bad';
      verdict='Dính bẫy hoa ăn thịt người!';
      sub=`Bạn hái nhầm <b>${killers} bông ăn thịt người</b> (mỗi bông −10 điểm), còn lại <b>${score} điểm</b>. Hoa lạ ngoài danh sách = rủi ro chưa được kiểm chứng.`;
    } else {
      const ideal=(score>=400);
      emoji=ideal?'🏆':'🌟'; verdictClass='good';
      verdict=ideal?'Xuất sắc — sàng lọc chuẩn!':'Làm tốt lắm!';
      sub=`Bạn đạt <b>${score} điểm</b> và <b>tránh được toàn bộ hoa nguy hiểm</b>. Có tiêu chí, bạn biết chọn gì và loại gì.`;
    }
    lessonTitle='Bài học sàng lọc';
    lesson=`<p>Yêu cầu 2 cho bạn một <b>bộ tiêu chí</b>: biết hoa nào giá trị (Trắng, Xanh lá, Đỏ) và ngầm hiểu hoa ngoài danh sách thì <b>nên tránh</b>.</p>
            <p>Tuyển dụng cũng vậy: khi có <b>chân dung ứng viên & tiêu chí rõ ràng</b>, ta sàng lọc đúng người, né được "hoa ăn thịt người" — những lựa chọn nhìn hấp dẫn nhưng gây hại về sau.</p>`;
  }

  renderResult(emoji,verdictClass,verdict,sub,lessonTitle,lesson,haul,mission===2);
}

// ── Render result ─────────────────────────────────────────────────────────────
function renderResult(emoji,verdictClass,verdict,sub,lessonTitle,lesson,haul,showScore){
  const el=document.getElementById('s-result');
  el.innerHTML=`
    <div class="result-emoji">${emoji}</div>
    <div class="verdict ${verdictClass}">${verdict}</div>
    <p class="result-sub">${sub}</p>
    ${showScore?`<div class="scoreline">Tổng điểm: <b>${score}</b></div>`:''}
    <div class="haul">${haul}</div>
    <div class="lesson">
      <div class="eyebrow">${lessonTitle}</div>
      ${lesson}
    </div>
    <div class="footer-cta">
      <button class="btn" onclick="assign()">Chơi lại 🔄</button>
      <button class="btn ghost" onclick="show('s-intro')" style="margin-top:10px">Về màn hình đầu</button>
    </div>`;
  show('s-result');
}
</script>
</body>
</html>
