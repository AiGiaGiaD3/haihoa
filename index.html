<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Khu Rừng Hái Hoa — Sàng Lọc Tuyển Dụng</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#f7fbf2;
    --moss:#2d7a45;
    --gold:#d4860a;
    --gold-light:#f9c84a;
    --red:#c93a26;
    --leaf:#2d9e50;
    --leaf-light:#d4f5dc;
    --black:#1e2e1a;
    --white:#ffffff;
    --text:#1e2e1a;
    --text-muted:#5a7055;
    --border:#c8e6bc;
    --shadow:rgba(30,46,26,0.10);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:'Be Vietnam Pro','Trebuchet MS','Segoe UI',system-ui,sans-serif;
    background:linear-gradient(160deg,#edfde6 0%,#f7fbf2 40%,#e8f5ff 100%);
    color:var(--text);
    min-height:100dvh;
    overflow-x:hidden;
    user-select:none;
    position:relative;
  }
  body::before{
    content:'🌸 🌼 🍀 🌺 🌷 🌻 🌹';
    position:fixed;top:0;left:0;right:0;bottom:0;
    font-size:48px;line-height:1.8;letter-spacing:32px;word-spacing:32px;
    opacity:0.07;pointer-events:none;z-index:0;overflow:hidden;
    white-space:pre-wrap;word-break:break-all;
  }

  .wrap{max-width:560px;margin:0 auto;min-height:100dvh;display:flex;flex-direction:column;padding:18px 16px 26px;position:relative;z-index:1}
  .screen{flex:1;display:none;flex-direction:column;animation:fade .4s ease}
  .screen.on{display:flex}
  @keyframes fade{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}

  .eyebrow{font-size:11px;letter-spacing:.32em;text-transform:uppercase;color:var(--moss);font-weight:900;text-align:center;margin-bottom:10px}
  h1{font-size:clamp(34px,9vw,52px);line-height:1.0;text-align:center;font-weight:900;letter-spacing:-.5px;color:var(--black)}

  /* intro flora */
  .meadow{display:flex;justify-content:center;gap:10px;font-size:40px;margin:26px 0 6px;flex-wrap:wrap}
  .meadow span{animation:sway 3s ease-in-out infinite;display:inline-block}
  .meadow span:nth-child(2n){animation-delay:.4s}
  .meadow span:nth-child(3n){animation-delay:.8s}
  @keyframes sway{0%,100%{transform:rotate(-7deg)}50%{transform:rotate(7deg)}}

  /* Buttons */
  .btn{
    border:none;border-radius:18px;padding:17px 22px;font-size:17px;font-weight:900;
    font-family:'Be Vietnam Pro',inherit;cursor:pointer;width:100%;
    background:linear-gradient(180deg,#56c86f,#2d9e50);color:#ffffff;
    box-shadow:0 5px 0 #1d6e36,0 10px 22px rgba(45,158,80,.22);
    transition:transform .08s,box-shadow .08s;letter-spacing:.01em;
  }
  .btn:active{transform:translateY(4px);box-shadow:0 1px 0 #1d6e36,0 4px 10px rgba(45,158,80,.2)}
  .btn.gold{background:linear-gradient(180deg,#f5c842,#d4860a);color:#3a2b06;box-shadow:0 5px 0 #9a6000,0 10px 22px rgba(212,134,10,.22)}
  .btn.gold:active{box-shadow:0 1px 0 #9a6000,0 4px 10px rgba(212,134,10,.2)}
  .btn.ghost{background:var(--white);color:var(--moss);box-shadow:none;border:2px solid var(--border);font-weight:700;font-size:15px;padding:13px}
  .btn.ghost:active{transform:translateY(2px)}
  .footer-cta{margin-top:auto;padding-top:22px;display:flex;flex-direction:column;gap:10px}

  /* mission card */
  .mission{
    margin:20px 4px 0;border-radius:22px;padding:22px 20px;
    background:var(--white);border:2px solid var(--border);
    box-shadow:0 4px 20px var(--shadow);
  }
  .mission .tag{display:inline-block;font-size:11px;letter-spacing:.18em;text-transform:uppercase;font-weight:900;padding:6px 14px;border-radius:20px;margin-bottom:14px}
  .mission.m1 .tag{background:var(--leaf-light);color:var(--moss)}
  .mission.m2 .tag{background:#fff0c2;color:#8a5e00}
  .mission h2{font-size:22px;margin-bottom:10px;line-height:1.2;color:var(--black)}
  .mission p{font-size:15px;line-height:1.65;color:var(--text-muted)}
  .mission p b{color:var(--black)}

  /* Progress stepper */
  .stepper{display:flex;align-items:center;justify-content:center;gap:6px;margin-bottom:18px}
  .step{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900;border:2px solid var(--border);background:var(--white);color:var(--text-muted);transition:all .3s}
  .step.done{background:var(--leaf);border-color:var(--leaf);color:#fff}
  .step.active{background:var(--white);border-color:var(--moss);color:var(--moss);box-shadow:0 0 0 3px rgba(45,122,69,.15)}
  .step-line{flex:1;max-width:40px;height:2px;border-radius:2px;background:var(--border);transition:background .3s}
  .step-line.done{background:var(--leaf)}
  .step-label{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--text-muted);font-weight:700;text-align:center;margin-top:4px}

  /* HUD */
  .hud{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:4px}
  .hud .pill{
    background:var(--white);border:2px solid var(--border);border-radius:16px;
    padding:9px 14px;font-size:13px;font-weight:700;display:flex;flex-direction:column;
    line-height:1.1;gap:2px;box-shadow:0 2px 8px var(--shadow);
  }
  .hud .pill b{font-size:21px;color:var(--moss)}
  .hud .pill.basket b{color:var(--leaf)}
  .hud .pill.timer b{color:var(--black)}
  .hud .pill.timer.low{border-color:#f5b4ac;background:#fff5f4}
  .hud .pill.timer.low b{color:var(--red);animation:tick .5s steps(1) infinite}
  @keyframes tick{0%,100%{opacity:1}50%{opacity:.3}}
  .hud .pill small{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--text-muted);font-weight:700}
  .obj{text-align:center;font-size:13px;color:var(--text-muted);margin:8px 2px 6px;min-height:18px;font-weight:600}
  .obj b{color:var(--gold)}

  /* forest grid */
  .forest{flex:1;display:grid;grid-template-columns:repeat(5,1fr);gap:9px;align-content:center;padding:10px 0}
  .flower{
    aspect-ratio:1;border:none;
    background:linear-gradient(145deg,#f0faf3,var(--white));
    border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:30px;cursor:pointer;
    position:relative;transition:transform .12s,opacity .25s,box-shadow .2s;
    border:2px solid var(--border);box-shadow:0 3px 10px var(--shadow);
  }
  .flower:hover{transform:scale(1.06);box-shadow:0 6px 18px rgba(45,122,69,.18)}
  .flower:active{transform:scale(.88)}
  .flower.picked{opacity:.22;pointer-events:none;transform:scale(.68) rotate(-12deg)}
  .flower.pop{animation:pop .45s ease}
  @keyframes pop{0%{transform:scale(1)}40%{transform:scale(1.48)}100%{transform:scale(.68) rotate(-12deg)}}
  .flower .float{position:absolute;font-size:15px;font-weight:900;pointer-events:none;animation:floatup .8s ease forwards;opacity:0}
  @keyframes floatup{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-34px)}}
  .flower .skull{position:absolute;font-size:34px;pointer-events:none;z-index:5;animation:skull .9s ease forwards}
  @keyframes skull{0%{opacity:0;transform:scale(.4)}25%{opacity:1;transform:scale(1.6)}70%{opacity:1;transform:scale(1.2)}100%{opacity:0;transform:scale(1.4) translateY(-18px)}}

  /* result */
  .result-emoji{font-size:64px;text-align:center;margin:6px 0 4px;animation:pop2 .5s ease}
  @keyframes pop2{0%{transform:scale(0)}70%{transform:scale(1.22)}100%{transform:scale(1)}}
  .verdict{text-align:center;font-size:24px;font-weight:900;margin-bottom:4px;letter-spacing:-.2px}
  .verdict.good{color:var(--leaf)}
  .verdict.bad{color:var(--red)}
  .verdict.ok{color:var(--gold)}
  .result-sub{text-align:center;font-size:14px;color:var(--text-muted);line-height:1.6;margin:0 8px 12px}
  .result-sub b{color:var(--black)}
  .haul{display:flex;flex-wrap:wrap;justify-content:center;gap:5px;margin:4px 0 12px;font-size:26px}
  .lesson{
    margin:0 2px;border-radius:20px;padding:18px;
    background:linear-gradient(160deg,#fffde8,#fffbf0);
    border:2px solid #f0d878;box-shadow:0 3px 14px rgba(212,134,10,.10);
  }
  .lesson .eyebrow{text-align:left;margin-bottom:8px;color:var(--gold)}
  .lesson p{font-size:14px;line-height:1.65;color:var(--text)}
  .lesson p b{color:var(--black)}
  .lesson p+p{margin-top:9px}
  .scoreline{text-align:center;font-size:16px;margin:2px 0 10px;font-weight:700;color:var(--text-muted)}
  .scoreline b{color:var(--gold);font-size:20px}

  /* Compare card – hiện ở kết quả cuối */
  .compare{
    margin:12px 2px 0;border-radius:20px;padding:18px;
    background:linear-gradient(160deg,#e8f5ff,#f0f8ff);
    border:2px solid #a8d4f0;box-shadow:0 3px 14px rgba(77,166,212,.10);
  }
  .compare .eyebrow{color:#2272a8;margin-bottom:10px}
  .compare-row{display:flex;gap:10px;margin-top:4px}
  .compare-col{flex:1;border-radius:14px;padding:12px;text-align:center}
  .compare-col.c1{background:var(--leaf-light);border:1.5px solid #9ed9b0}
  .compare-col.c2{background:#fff0c2;border:1.5px solid #f0d878}
  .compare-col .clabel{font-size:10px;font-weight:900;letter-spacing:.14em;text-transform:uppercase;color:var(--text-muted);margin-bottom:6px}
  .compare-col .cbig{font-size:22px;font-weight:900;color:var(--black);margin-bottom:2px}
  .compare-col .csub{font-size:12px;color:var(--text-muted);line-height:1.4}

  /* hero intro card */
  .hero-card{margin-top:20px;background:var(--white);border-radius:24px;border:2px solid var(--border);padding:24px 20px;box-shadow:0 6px 28px var(--shadow);text-align:center}
  .hero-card p{color:var(--text-muted);font-size:15px;line-height:1.6}
  .garden-stripe{height:8px;border-radius:99px;margin:16px 0;background:linear-gradient(90deg,#56c86f,#f9c84a,#e8703a,#e87da8,#9b6fd4,#4da6d4,#56c86f)}
</style>
</head>
<body>
<div class="wrap">

  <!-- INTRO -->
  <section class="screen on" id="s-intro">
    <h1 style="margin-top:auto">Rừng Hoa<br>Muôn Sắc 🌸</h1>
    <div class="meadow">
      <span>🌼</span><span>🌹</span><span>🍀</span><span>🤍</span><span>🌺</span><span>🌷</span><span>🌻</span>
    </div>
    <div class="hero-card">
      <div class="garden-stripe"></div>
      <p>Mời bạn tham quan Rừng hoa muôn sắc.</p>
      <div class="garden-stripe"></div>
    </div>
    <div class="footer-cta" style="margin-top:auto">
      <button class="btn" onclick="startRound1()">Vào rừng 🌲</button>
    </div>
  </section>

  <!-- MISSION -->
  <section class="screen" id="s-mission"></section>

  <!-- GAME -->
  <section class="screen" id="s-game">
    <div id="stepper-area"></div>
    <div class="hud">
      <div class="pill basket"><small>Đã hái</small><span><b id="hud-count">0</b>/10</span></div>
      <div class="pill" id="hud-score-pill" style="display:none"><small>Điểm</small><b id="hud-score">0</b></div>
      <div class="pill timer" id="hud-timer-pill"><small>Thời gian</small><b id="hud-timer">10</b></div>
    </div>
    <div class="obj" id="obj"></div>
    <div class="forest" id="forest"></div>
  </section>

  <!-- RESULT -->
  <section class="screen" id="s-result"></section>

</div>

<script>
const FLOWERS = [
  {key:'white',  emoji:'🤍', n:2, pts:100, name:'Trắng'},
  {key:'leaf',   emoji:'🍀', n:3, pts:50,  name:'Xanh lá'},
  {key:'red',    emoji:'🌹', n:5, pts:20,  name:'Đỏ'},
  {key:'orange', emoji:'🧡', n:5, pts:0,   name:'Cam'},
  {key:'gold',   emoji:'🌼', n:5, pts:0,   name:'Vàng'},
  {key:'pink',   emoji:'🌷', n:5, pts:0,   name:'Hồng'},
  {key:'purple', emoji:'💜', n:5, pts:0,   name:'Tím'},
  {key:'carn',   emoji:'🌺', n:5, pts:-10, name:'Ăn thịt người', killer:true},
];

// State
let deck=[], mission=0, picked=[], score=0;
let round1Result=null; // lưu kết quả vòng 1

function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('on'));document.getElementById(id).classList.add('on')}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[a[i],a[j]]=[a[j],a[i]]}return a}

/* ── STEPPER ─────────────────────────────── */
function renderStepper(activeRound){
  // activeRound = 1 hoặc 2
  const d1 = activeRound>1 ? 'done' : 'active';
  const d2 = activeRound===2 ? 'active' : '';
  const lineClass = activeRound>1 ? 'done' : '';
  document.getElementById('stepper-area').innerHTML=`
    <div class="stepper">
      <div>
        <div class="step ${d1}">${activeRound>1?'✓':'1'}</div>
      </div>
      <div class="step-line ${lineClass}"></div>
      <div>
        <div class="step ${d2}">2</div>
      </div>
    </div>`;
}

/* ── VÒNG 1 ──────────────────────────────── */
function startRound1(){
  mission=1;
  const el=document.getElementById('s-mission');
  el.innerHTML=`
    <div class="eyebrow" style="margin-top:auto">Nhiệm vụ của bạn</div>
    <div class="mission m1">
      <span class="tag">Yêu cầu 1</span>
      <h2>Hái hoa 🌸</h2>
      <p>Hái được <b>10 bông hoa bất kỳ</b>.</p>
    </div>
    <div class="footer-cta"><button class="btn" onclick="startGame()">Bắt đầu hái 🌿</button></div>`;
  show('s-mission');
}

/* ── VÒNG 2 ──────────────────────────────── */
function startRound2(){
  mission=2;
  const el=document.getElementById('s-mission');
  el.innerHTML=`
    <div class="eyebrow" style="margin-top:auto">Nhiệm vụ của bạn</div>
    <div class="mission m2">
      <span class="tag">Yêu cầu 2</span>
      <h2>Hái hoa 🌸</h2>
      <p>Hái 10 bông hoa, biết rằng hoa <b>Trắng</b> được 100 điểm, hoa <b>Xanh lá</b> được 50 điểm, hoa <b>Đỏ</b> được 20 điểm.</p>
    </div>
    <div class="footer-cta"><button class="btn gold" onclick="startGame()">Bắt đầu hái 🌿</button></div>`;
  show('s-mission');
}

/* ── BUILD & START GAME ───────────────────── */
function buildDeck(){
  deck=[];
  FLOWERS.forEach(f=>{for(let i=0;i<f.n;i++)deck.push(f)});
  shuffle(deck);
}

function startGame(){
  picked=[];score=0;buildDeck();
  document.getElementById('hud-count').textContent=0;
  document.getElementById('hud-score').textContent=0;
  document.getElementById('hud-score-pill').style.display=mission===2?'flex':'none';
  document.getElementById('obj').innerHTML=mission===2
    ? 'Trắng <b>+100</b> · Xanh lá <b>+50</b> · Đỏ <b>+20</b>'
    : 'Hái <b>10 bông hoa</b> bạn thích';
  renderStepper(mission);
  const f=document.getElementById('forest');
  f.innerHTML='';
  deck.forEach((flo,i)=>{
    const b=document.createElement('button');
    b.className='flower';b.textContent=flo.emoji;b.dataset.i=i;
    b.onclick=()=>pick(b,flo);
    f.appendChild(b);
  });
  startTimer();
  show('s-game');
}

/* ── TIMER ────────────────────────────────── */
let timeLeft=10, timerId=null;
function startTimer(){
  clearInterval(timerId);
  timeLeft=10;
  const pill=document.getElementById('hud-timer-pill');
  const num=document.getElementById('hud-timer');
  pill.classList.remove('low');
  num.textContent=timeLeft;
  timerId=setInterval(()=>{
    timeLeft--;
    num.textContent=timeLeft;
    if(timeLeft<=3)pill.classList.add('low');
    if(timeLeft<=0){clearInterval(timerId);finish(true);}
  },1000);
}

/* ── PICK ─────────────────────────────────── */
function pick(btn,flo){
  if(picked.length>=10)return;
  picked.push(flo);
  btn.classList.add('picked','pop');
  if(flo.killer){
    const sk=document.createElement('span');sk.className='skull';sk.textContent='💀';btn.appendChild(sk);
    if(navigator.vibrate)navigator.vibrate(120);
  }
  if(mission===2){
    score+=flo.pts;
    document.getElementById('hud-score').textContent=score;
    const fl=document.createElement('span');fl.className='float';
    fl.textContent=(flo.pts>=0?'+':'')+flo.pts;
    fl.style.color=flo.pts>0?'#d4860a':(flo.pts<0?'#c93a26':'#5a7055');
    btn.appendChild(fl);
  }
  document.getElementById('hud-count').textContent=picked.length;
  if(picked.length===10){clearInterval(timerId);setTimeout(()=>finish(false),650);}
}

/* ── FINISH ───────────────────────────────── */
function finish(timedOut){
  clearInterval(timerId);
  const killers=picked.filter(f=>f.killer).length;
  const haul=picked.length?picked.map(f=>f.emoji).join(' '):'—';

  if(mission===1){
    // Lưu kết quả vòng 1
    round1Result={killers,haul,picked:picked.length,timedOut};
    finishRound1(timedOut,killers,haul);
  } else {
    finishRound2(timedOut,killers,haul);
  }
}

/* ── KẾT QUẢ VÒNG 1 (tóm tắt → tiếp tục) ── */
function finishRound1(timedOut,killers,haul){
  let emoji,verdictClass,verdict,sub;
  if(timedOut && picked.length<10){
    emoji='⏰';verdictClass='ok';
    verdict='Hết giờ rồi!';
    sub=`Bạn mới hái được <b>${picked.length}/10 bông</b> trong 10 giây. Vội vàng dễ bỏ lỡ — và cũng dễ chọn nhầm.`;
  } else if(killers>0){
    emoji='💀';verdictClass='bad';
    verdict='Bạn đã hái phải hoa ăn thịt người!';
    sub=`Trong giỏ có <b>${killers} bông hoa ăn thịt người</b>. Hái "bất kỳ" cũng đồng nghĩa với hái cả rủi ro.`;
  } else {
    emoji='😅';verdictClass='ok';
    verdict='May mắn thoát nạn!';
    sub='Lần này bạn không hái phải hoa ăn thịt người — nhưng đó là <b>may rủi</b>, không phải nhờ sàng lọc.';
  }

  const el=document.getElementById('s-result');
  el.innerHTML=`
    <div style="display:flex;align-items:center;justify-content:center;gap:6px;margin-bottom:16px">
      <div class="step done" style="width:32px;height:32px;font-size:12px">✓</div>
      <div class="step-line done" style="max-width:40px"></div>
      <div class="step active" style="width:32px;height:32px;font-size:12px">2</div>
    </div>
    <div class="result-emoji">${emoji}</div>
    <div class="verdict ${verdictClass}">${verdict}</div>
    <p class="result-sub">${sub}</p>
    <div class="haul">${haul}</div>
    <div class="lesson">
      <div class="eyebrow">Bài học sàng lọc — Yêu cầu 1</div>
      <p>Khi tuyển dụng <b>không có tiêu chí rõ ràng</b>, ta "hái" ứng viên một cách ngẫu nhiên — ai nộp cũng nhận. Khu rừng nào cũng có hoa ăn thịt người ẩn trong đám hoa đẹp.</p>
      <p>Người làm theo Yêu cầu 1 không hề biết bông nào nguy hiểm, vì <b>chẳng ai cho họ bộ tiêu chí</b> để loại trừ.</p>
    </div>
    <div class="footer-cta">
      <button class="btn gold" onclick="startRound2()">Thử Yêu cầu 2 →</button>
    </div>`;
  show('s-result');
}

/* ── KẾT QUẢ VÒNG 2 (tổng kết so sánh) ──── */
function finishRound2(timedOut,killers,haul){
  let emoji,verdictClass,verdict,sub;
  if(timedOut && picked.length<10){
    emoji='⏰';verdictClass='ok';
    verdict='Hết giờ rồi!';
    sub=`Bạn mới hái được <b>${picked.length}/10 bông</b> trong 10 giây.`;
  } else if(killers>0){
    emoji='💀';verdictClass='bad';
    verdict='Dính bẫy hoa ăn thịt người!';
    sub=`Bạn hái nhầm <b>${killers} bông ăn thịt người</b> (mỗi bông −10 điểm), còn lại <b>${score} điểm</b>. Hoa lạ ngoài danh sách = rủi ro chưa được kiểm chứng.`;
  } else {
    const ideal=(score>=400);
    emoji=ideal?'🏆':'🌟';verdictClass='good';
    verdict=ideal?'Xuất sắc — sàng lọc chuẩn!':'Làm tốt lắm!';
    sub=`Bạn đạt <b>${score} điểm</b> và <b>tránh được toàn bộ hoa nguy hiểm</b>. Có tiêu chí, bạn biết chọn gì và loại gì.`;
  }

  // So sánh 2 vòng
  const r1=round1Result;
  const r1Status = r1.timedOut ? '⏰ Hết giờ' : r1.killers>0 ? `💀 ${r1.killers} bông độc` : '😅 May mắn';
  const r2Status = timedOut ? '⏰ Hết giờ' : killers>0 ? `💀 ${killers} bông độc` : verdictClass==='good' ? `✅ ${score} điểm` : `⚠️ ${score} điểm`;

  const el=document.getElementById('s-result');
  el.innerHTML=`
    <div style="display:flex;align-items:center;justify-content:center;gap:6px;margin-bottom:16px">
      <div class="step done" style="width:32px;height:32px;font-size:12px">✓</div>
      <div class="step-line done" style="max-width:40px"></div>
      <div class="step done" style="width:32px;height:32px;font-size:12px">✓</div>
    </div>
    <div class="result-emoji">${emoji}</div>
    <div class="verdict ${verdictClass}">${verdict}</div>
    <p class="result-sub">${sub}</p>
    <div class="scoreline">Tổng điểm Yêu cầu 2: <b>${score}</b></div>
    <div class="haul">${haul}</div>

    <div class="compare">
      <div class="eyebrow">So sánh hai lượt chơi</div>
      <div class="compare-row">
        <div class="compare-col c1">
          <div class="clabel">Yêu cầu 1</div>
          <div class="cbig">${r1.haul.slice(0,5)}…</div>
          <div class="csub">${r1Status}<br>Không có tiêu chí</div>
        </div>
        <div class="compare-col c2">
          <div class="clabel">Yêu cầu 2</div>
          <div class="cbig">${haul.slice(0,5)}…</div>
          <div class="csub">${r2Status}<br>Có bộ tiêu chí</div>
        </div>
      </div>
    </div>

    <div class="lesson" style="margin-top:12px">
      <div class="eyebrow">Bài học sàng lọc — Tổng kết</div>
      <p>Yêu cầu 2 cho bạn một <b>bộ tiêu chí</b>: biết hoa nào giá trị (Trắng, Xanh lá, Đỏ) và ngầm hiểu hoa ngoài danh sách thì <b>nên tránh</b>.</p>
      <p>Tuyển dụng cũng vậy: khi có <b>chân dung ứng viên & tiêu chí rõ ràng</b>, ta sàng lọc đúng người, né được "hoa ăn thịt người" — những lựa chọn nhìn hấp dẫn nhưng gây hại về sau.</p>
    </div>
    <div class="footer-cta">
      <button class="btn" onclick="resetAll()">Chơi lại từ đầu 🔄</button>
      <button class="btn ghost" onclick="show('s-intro')">Về màn hình đầu</button>
    </div>`;
  show('s-result');
}

function resetAll(){
  round1Result=null;
  startRound1();
}
</script>

</body>
</html>
